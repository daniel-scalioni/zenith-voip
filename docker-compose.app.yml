networks:
  ai-hub-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  ollama_data:
  piper_models:

secrets:
  signalwire_token:
    file: ./freeswitch/signalwire_token.txt

services:
  freeswitch:
    build:
      context: ./freeswitch
      dockerfile: Dockerfile
      secrets:
        - signalwire_token
    container_name: freeswitch
    network_mode: host
    volumes:
      - ./freeswitch/conf:/etc/freeswitch
      - ./audio:/usr/share/freeswitch/sounds/zenith
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - SYS_RESOURCE
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped

  fastapi-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenith-api-1
    hostname: zenith-api-1
    networks:
      - ai-hub-net
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      - INSTANCE_ID=1
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://zenith:zenith@postgres:5432/zenith
      - FREESWITCH_ESL_HOST=172.20.0.1
      - FREESWITCH_ESL_PORT=8021
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OLLAMA_URL=http://ollama:11434
      - RECORDINGS_PATH=/data/recordings
    volumes:
      - ./src:/app/src
      - ./data/recordings:/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  fastapi-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenith-api-2
    hostname: zenith-api-2
    networks:
      - ai-hub-net
    ports:
      - "8002:8000"
    env_file: .env
    environment:
      - INSTANCE_ID=2
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://zenith:zenith@postgres:5432/zenith
      - FREESWITCH_ESL_HOST=172.20.0.1
      - FREESWITCH_ESL_PORT=8021
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OLLAMA_URL=http://ollama:11434
      - RECORDINGS_PATH=/data/recordings
    volumes:
      - ./src:/app/src
      - ./data/recordings:/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  arq-uploader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenith-arq-uploader
    networks:
      - ai-hub-net
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://zenith:zenith@postgres:5432/zenith
      - RECORDINGS_PATH=/data/recordings
    volumes:
      - ./src:/app/src
      - ./data/recordings:/data/recordings
    command: ["arq", "src.workers.audio_uploader.WorkerSettings"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  arq-cleanup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenith-arq-cleanup
    networks:
      - ai-hub-net
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://zenith:zenith@postgres:5432/zenith
      - AUDIO_RETENTION_DAYS=${AUDIO_RETENTION_DAYS:-90}
      - RECORDINGS_PATH=/data/recordings
    volumes:
      - ./src:/app/src
      - ./data/recordings:/data/recordings
    command: ["arq", "src.workers.audio_cleanup.WorkerSettings"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  bunkerweb:
    image: bunkerity/bunkerweb:1.5.12
    container_name: bunkerweb
    networks:
      - ai-hub-net
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SERVER_NAME=zenith.local
      - USE_REVERSE_PROXY=yes
      - REVERSE_PROXY_URL=/
      - REVERSE_PROXY_HOST=http://fastapi-1:8000
      - MULTISITE=yes
      - API_WHITELIST_IP=172.20.0.0/16
      - USE_CUSTOM_HEADERS=yes
      - CUSTOM_HEADERS=X-Call-ID $http_x_call_id
      - STICKY_SESSION=yes
      - STICKY_SESSION_NAME=X-Call-ID
    volumes:
      - ./bunkerweb:/etc/bunkerweb/configs
    depends_on:
      - fastapi-1
      - fastapi-2
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.5.7
    container_name: zenith-ollama
    networks:
      - ai-hub-net
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  piper-tts:
    image: rhasspy/piper-tts:2023.11.14
    container_name: zenith-piper
    networks:
      - ai-hub-net
    ports:
      - "5000:5000"
    volumes:
      - piper_models:/usr/share/piper/voices
    command: ["python3", "-m", "piper.http_server", "--port", "5000"]
    restart: unless-stopped
