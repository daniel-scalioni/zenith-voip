networks:
  ai-hub-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  zenith_ollama_data:
  # Gravação de chamadas em RAM (tmpfs), não no HD do sistema — combina com
  # a retenção curta (1h, ver arq-cleanup). Ver backlog Fase 1C.
  zenith_recordings_tmpfs:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=512m"

secrets:
  signalwire_token:
    file: ./freeswitch/signalwire_token.txt

services:
  freeswitch:
    # Build customizado restaurado (feature 007-audio-stream-migration):
    # mod_audio_fork foi substituído por mod_audio_stream, que não depende
    # mais do repositório SignalWire estar sempre disponível (.deb
    # vendorizados em freeswitch/vendor/debs/). Ver GAP-11 em
    # _reversa_sdd/gaps.md.
    build:
      context: ./freeswitch
      dockerfile: Dockerfile
      secrets:
        - signalwire_token
    container_name: zenith-freeswitch
    network_mode: host
    volumes:
      - ./freeswitch/conf:/etc/freeswitch
      - ./audio:/usr/share/freeswitch/sounds/zenith
    cap_add:
      - NET_ADMIN
      - SYS_NICE
      - SYS_RESOURCE
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped

  fastapi-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenith-api-1
    hostname: zenith-api-1
    networks:
      - ai-hub-net
    ports:
      - "127.0.0.1:8001:8000"
    env_file: .env
    environment:
      - INSTANCE_ID=1
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://zenith:zenith@postgres:5432/zenith
      - FREESWITCH_ESL_HOST=172.21.0.1
      - FREESWITCH_ESL_PORT=8021
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OLLAMA_URL=http://ollama:11434
      - RECORDINGS_PATH=/data/recordings
    volumes:
      - ./src:/app/src
      - zenith_recordings_tmpfs:/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  fastapi-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenith-api-2
    hostname: zenith-api-2
    networks:
      - ai-hub-net
    ports:
      - "127.0.0.1:8002:8000"
    env_file: .env
    environment:
      - INSTANCE_ID=2
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://zenith:zenith@postgres:5432/zenith
      - FREESWITCH_ESL_HOST=172.21.0.1
      - FREESWITCH_ESL_PORT=8021
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OLLAMA_URL=http://ollama:11434
      - RECORDINGS_PATH=/data/recordings
    volumes:
      - ./src:/app/src
      - zenith_recordings_tmpfs:/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  arq-uploader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenith-arq-uploader
    networks:
      - ai-hub-net
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://zenith:zenith@postgres:5432/zenith
      - RECORDINGS_PATH=/data/recordings
    volumes:
      - ./src:/app/src
      - zenith_recordings_tmpfs:/data/recordings
    command: ["arq", "src.workers.audio_uploader.WorkerSettings"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  arq-cleanup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zenith-arq-cleanup
    networks:
      - ai-hub-net
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://zenith:zenith@postgres:5432/zenith
      # ~1 hora (Fase 1 do MVP: gravação é temporária, para auditoria imediata).
      - AUDIO_RETENTION_DAYS=${AUDIO_RETENTION_DAYS:-0.0417}
      - RECORDINGS_PATH=/data/recordings
    volumes:
      - ./src:/app/src
      - zenith_recordings_tmpfs:/data/recordings
    command: ["arq", "src.workers.audio_cleanup.WorkerSettings"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ip-watcher:
    build: ./sidecar
    container_name: zenith-ip-watcher
    network_mode: host
    volumes:
      - ./freeswitch/conf:/etc/freeswitch
    env_file: .env
    environment:
      - EXTERNAL_IP_ENDPOINT=${EXTERNAL_IP_ENDPOINT}
      - FREESWITCH_ESL_HOST=127.0.0.1
      - FREESWITCH_ESL_PORT=8021
      - FREESWITCH_ESL_PASSWORD=${FREESWITCH_ESL_PASSWORD:-ClueCon}
      - FREESWITCH_CONF_PATH=/etc/freeswitch
      - MOCK_EXTERNAL_IP=${MOCK_EXTERNAL_IP:-}
      - POLL_INTERVAL=${POLL_INTERVAL:-60}
      - SSL_VERIFY=${SSL_VERIFY:-true}
    depends_on:
      - freeswitch
    restart: unless-stopped

  bunkerweb:
    image: bunkerity/bunkerweb:1.5.12
    container_name: zenith-bunkerweb
    networks:
      - ai-hub-net
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SERVER_NAME=zenith.local
      - USE_REVERSE_PROXY=yes
      - REVERSE_PROXY_URL=/
      - REVERSE_PROXY_HOST=http://fastapi-1:8000
      - MULTISITE=yes
      - API_WHITELIST_IP=172.21.0.0/16
      - USE_CUSTOM_HEADERS=yes
      - CUSTOM_HEADERS=X-Call-ID $http_x_call_id
      - STICKY_SESSION=yes
      - STICKY_SESSION_NAME=X-Call-ID
    volumes:
      - ./bunkerweb:/etc/bunkerweb/configs
    depends_on:
      - fastapi-1
      - fastapi-2
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.5.7
    container_name: zenith-ollama
    networks:
      - ai-hub-net
    ports:
      - "11434:11434"
    volumes:
      - zenith_ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped

  # Serviço piper-tts removido (feature 008-piper-tts-standalone): a imagem
  # rhasspy/piper-tts:2023.11.14 nunca existiu (GAP-18). TTS agora roda como
  # processo local via API Python do pacote piper-tts (ver
  # src/services/tts_service.py), sem microserviço separado.
