networks:
  ai-hub-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: zenith-postgres
    networks:
      - ai-hub-net
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=zenith
      - POSTGRES_PASSWORD=zenith
      - POSTGRES_DB=zenith
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenith"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zenith-redis
    networks:
      - ai-hub-net
    # Sem publish de porta no host: 6379 já está em uso por outro serviço
    # (sre_redis) neste host compartilhado. Comunicação interna via rede
    # ai-hub-net (redis://redis:6379) não depende dessa porta publicada.
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: zenith-prometheus
    networks:
      - ai-hub-net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: zenith-grafana
    networks:
      - ai-hub-net
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=zenith
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    container_name: zenith-loki
    networks:
      - ai-hub-net
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
